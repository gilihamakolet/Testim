<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול טסטים חודשי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap');

  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #dde2f0;
    --accent: #2563eb;
    --accent2: #d97706;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #b45309;
    --text: #1e2340;
    --muted: #6b7280;
    --font: 'Heebo', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .month-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }

  /* ── KPI BAR ── */
  .kpi-bar {
    display: flex;
    gap: 12px;
    padding: 20px 24px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    min-width: 130px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .kpi-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .kpi.done .kpi-num { color: var(--green); }
  .kpi.pending .kpi-num { color: var(--yellow); }
  .kpi.urgent .kpi-num { color: var(--red); }
  .kpi.total .kpi-num { color: var(--accent); }

  /* ── FILTERS ── */
  .filters {
    padding: 20px 24px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .filter-btn.zone { border-radius: 20px; }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* ── ZONE SECTIONS ── */
  .zone-section { padding: 20px 24px 0; }
  .zone-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .zone-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .zone-count {
    background: var(--card);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
    margin-right: auto;
  }

  /* ── CARD ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .car-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: border-color .2s, transform .1s, box-shadow .2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .car-card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 0 14px 14px 0;
  }
  .car-card.status-done::before { background: var(--green); }
  .car-card.status-urgent::before { background: var(--red); }
  .car-card.status-pending::before { background: var(--yellow); }

  .car-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.12); }
  .car-card.status-done { opacity: .6; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .plate {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .status-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .tag-done { background: #dcfce7; color: var(--green); }
  .tag-urgent { background: #fee2e2; color: var(--red); }
  .tag-pending { background: #fef3c7; color: var(--yellow); }

  .card-mid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .info-val { font-size: 13px; font-weight: 500; }

  .card-bottom {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .action-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .action-btn:hover { opacity: .85; }
  .btn-done { background: var(--green); color: #fff; }
  .btn-call { background: var(--surface); color: var(--accent); border: 1px solid var(--accent); }
  .btn-undo { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .btn-note { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  .note-area {
    display: none;
    width: 100%;
    margin-top: 10px;
  }
  .note-area.open { display: block; }
  .note-area textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 10px;
    resize: vertical;
    min-height: 70px;
    outline: none;
  }
  .note-area textarea:focus { border-color: var(--accent); }
  .note-save {
    margin-top: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-family: var(--font);
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
  }
  .note-display {
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent2);
    border-right: 2px solid var(--accent2);
    padding-right: 8px;
    background: #fff7ed;
    border-radius: 4px;
    padding: 6px 8px;
  }

  /* ── ADD VEHICLE PANEL ── */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,.3);
    z-index: 200;
    transition: transform .15s;
  }
  .fab:hover { transform: scale(1.05); }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-submit { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px; font-family: var(--font); font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-family: var(--font); font-weight: 700; font-size: 14px; cursor: pointer; }

  /* empty state */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  @media (min-width: 600px) {
    .cards { display: grid; grid-template-columns: 1fr 1fr; }
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 20px; max-height: 80vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">טסטים <span>חודשי</span></div>

</header>

<div class="kpi-bar">

<div class="filters" id="filtersArea">

</div>

<!-- Zone filter pills will be injected here -->
<div class="filters" id="zonePills" style="padding-top:8px;"></div>

<div id="mainContent"></div>

<button class="fab" onclick="openModal()">＋ הוסף רכב</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="modalBackdrop">

    <h3 id="modalTitle">הוסף רכב לרשימה</h3>

        <label>לוחית רישוי</label>
        <input id="fPlate" type="text" placeholder="12-345-67">
      </div>
      <div class="form-group">
        <label>תאריך תום תקופת רישוי</label>
        <input id="fExpiry" type="date">
      </div>
    </div>
    <div class="form-group">
      <label>חברה שוכרת</label>
      <input id="fCompany" type="text" placeholder="שם החברה">
    </div>
    <div class="form-group">
      <label>שם הנהג</label>
      <input id="fDriver" type="text" placeholder="שם הנהג">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>מיקום איסוף</label>
        <input id="fLocation" type="text" placeholder="כתובת / עיר">
      </div>
      <div class="form-group">
        <label>אזור</label>
        <select id="fZone">
          <option value="מרכז">מרכז</option>
          <option value="תל אביב">תל אביב</option>
          <option value="ירושלים">ירושלים</option>
          <option value="צפון">צפון</option>
          <option value="דרום">דרום</option>
          <option value="שפלה">שפלה</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>טלפון נייד</label>
      <input id="fPhone" type="tel" placeholder="05X-XXXXXXX">
    </div>
    <input type="hidden" id="fEditId" value="">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-submit" onclick="saveVehicle()">שמור</button>
    </div>
  </div>
</div>

// ────────────────────────────────────────────

// ────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }

function getStatus(v) {
  if (v.done) return 'done';
  const diff = Math.ceil((new Date(v.expiry) - new Date(today())) / 86400000);
  if (diff <= 7) return 'urgent';
  return 'pending';
}

function daysLeft(expiry) {
  return Math.ceil((new Date(expiry) - new Date(today())) / 86400000);
}

function daysLabel(v) {
  if (v.done) return 'בוצע';
  const d = daysLeft(v.expiry);
  if (d < 0) return `פג תוקף לפני ${Math.abs(d)} ימים`;
  if (d === 0) return 'היום!';
  if (d === 1) return 'מחר';
  return `בעוד ${d} ימים`;
}

function formatDate(d) {
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function uniqueZones() {
  return [...new Set(vehicles.map(v => v.zone))].sort();
}

// ────────────────────────────────────────────
// FILTER STATE
// ────────────────────────────────────────────
let activeFilter = 'all';
let activeZone = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filters .filter-btn:not(.zone)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function setZone(z, btn) {
  activeZone = z;
  document.querySelectorAll('.filter-btn.zone').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────
const ZONE_COLORS = {
  'חיפה/קריות': '#4f8ef7',
  'עכו/נהריה':  '#3ecf6e',
  'כרמיאל':     '#a14ff7',
  'טבריה':      '#f7a14f',
  'עפולה/נצרת': '#f75b5b',
  'צפון':       '#4ff7e8',
};
function zoneColor(zone) { return ZONE_COLORS[zone] || '#7b80a0'; }

function renderZonePills() {
  const zones = uniqueZones();
  const container = document.getElementById('zonePills');
  container.innerHTML = `<button class="filter-btn zone ${activeZone==='all'?'active':''}" onclick="setZone('all',this)">כל האזורים</button>`;
  zones.forEach(z => {
    const btn = document.createElement('button');
    btn.className = `filter-btn zone ${activeZone===z?'active':''}`;
    btn.style.cssText = activeZone===z ? '' : `color:${zoneColor(z)};border-color:${zoneColor(z)}40`;
    btn.textContent = z;
    btn.onclick = function(){ setZone(z, this); };
    container.appendChild(btn);
  });
}

function getFiltered() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  return vehicles.filter(v => {
    const st = getStatus(v);
    if (activeFilter !== 'all' && st !== activeFilter) return false;
    if (activeZone !== 'all' && v.zone !== activeZone) return false;
    if (q && !v.plate.toLowerCase().includes(q) && !v.driver.toLowerCase().includes(q) && !v.company.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => a.expiry.localeCompare(b.expiry));
}

function renderAll() {
  renderZonePills();
  updateKPIs();
  renderMonth();

  const filtered = getFiltered();
  const container = document.getElementById('mainContent');

  if (activeZone !== 'all' || activeFilter !== 'all' || document.getElementById('searchBox').value) {
    // flat view
    container.innerHTML = '';
    const sec = document.createElement('div');
    sec.className = 'zone-section';
    if (filtered.length === 0) {
      sec.innerHTML = '<div class="empty">לא נמצאו רכבים</div>';
    } else {
      const cards = document.createElement('div');
      cards.className = 'cards';
      filtered.forEach(v => { cards.appendChild(buildCard(v)); });
      sec.appendChild(cards);
    }
    container.appendChild(sec);
    return;
  }

  // grouped by zone
  container.innerHTML = '';
  const zones = [...new Set(vehicles.map(v => v.zone))];
  zones.forEach(zone => {
    const inZone = filtered.filter(v => v.zone === zone);
    if (!inZone.length) return;
    const sec = document.createElement('div');
    sec.className = 'zone-section';
    sec.innerHTML = `
      <div class="zone-title">
        <div class="zone-dot" style="background:${zoneColor(zone)}"></div>
        ${zone}
        <span class="zone-count">${inZone.length} רכבים</span>
      </div>`;
    const cards = document.createElement('div');
    cards.className = 'cards';
    inZone.forEach(v => cards.appendChild(buildCard(v)));
    sec.appendChild(cards);
    container.appendChild(sec);
  });
}

function buildCard(v) {
  const st = getStatus(v);
  const card = document.createElement('div');
  card.className = `car-card status-${st}`;
  card.id = `card-${v.id}`;

  const tagMap = { done:'tag-done', urgent:'tag-urgent', pending:'tag-pending' };
  const tagLabel = { done:'✓ בוצע', urgent:'⚠ דחוף', pending:'⏳ ממתין' };

  card.innerHTML = `
    <div class="card-top">
      <div class="plate">${v.plate}</div>
      <div class="status-tag ${tagMap[st]}">${tagLabel[st]}</div>
    </div>
    <div class="card-mid">
      <div class="info-item">
        <div class="info-label">נהג</div>
        <div class="info-val">${v.driver}</div>
      </div>
      <div class="info-item">
        <div class="info-label">חברה</div>
        <div class="info-val">${v.company}</div>
      </div>
      <div class="info-item">
        <div class="info-label">מיקום</div>
        <div class="info-val">${v.location}</div>
      </div>
      <div class="info-item">
        <div class="info-label">תאריך פקיעה</div>
        <div class="info-val" style="color:${st==='urgent'?'var(--red)':st==='done'?'var(--green)':'var(--text)'}">${formatDate(v.expiry)} · ${daysLabel(v)}</div>
      </div>
    </div>
    ${v.note ? `<div class="note-display">📝 ${v.note}</div>` : ''}
    <div class="card-bottom">
      ${!v.done ? `<button class="action-btn btn-done" onclick="markDone(${v.id})">✓ בוצע</button>` : `<button class="action-btn btn-undo" onclick="markUndo(${v.id})">↩ בטל</button>`}
      <button class="action-btn btn-call" onclick="callDriver('${v.phone}')">📞 ${v.phone}</button>
      <button class="action-btn btn-note" onclick="toggleNote(${v.id})">📝 הערה</button>
      <button class="action-btn btn-note" onclick="editVehicle(${v.id})">✏️</button>
      <button class="action-btn" onclick="deleteVehicle(${v.id})" style="background:#3d1e1e;color:var(--red);border:1px solid var(--red);margin-right:auto">🗑 מחק</button>
    </div>
    <div class="note-area" id="noteArea-${v.id}">
      <textarea id="noteText-${v.id}" placeholder="הוסף הערה...">${v.note}</textarea>
      <button class="note-save" onclick="saveNote(${v.id})">שמור הערה</button>
    </div>
  `;
  return card;
}

function updateKPIs() {
  const all = vehicles;
  const done = all.filter(v => v.done).length;
  const urgent = all.filter(v => getStatus(v) === 'urgent').length;
  const pending = all.filter(v => getStatus(v) === 'pending').length;
  document.getElementById('kpiTotal').textContent = all.length;
  document.getElementById('kpiDone').textContent = done;
  document.getElementById('kpiPending').textContent = pending;
  document.getElementById('kpiUrgent').textContent = urgent;
}

function renderMonth() {
  const now = new Date();
  document.getElementById('monthLabel').textContent =
    now.toLocaleDateString('he-IL', { month:'long', year:'numeric' });
}

// ────────────────────────────────────────────
// ACTIONS
// ────────────────────────────────────────────
function markDone(id) {
  vehicles = vehicles.map(v => v.id===id ? {...v, done:true} : v);
  save(vehicles); renderAll();
}
function markUndo(id) {
  vehicles = vehicles.map(v => v.id===id ? {...v, done:false} : v);
  save(vehicles); renderAll();
}
function toggleNote(id) {
  const el = document.getElementById(`noteArea-${id}`);
  el.classList.toggle('open');
}
function saveNote(id) {
  const text = document.getElementById(`noteText-${id}`).value.trim();
  vehicles = vehicles.map(v => v.id===id ? {...v, note:text} : v);
  save(vehicles); renderAll();
}
function deleteVehicle(id) {
  const v = vehicles.find(x => x.id === id);
  if (!v) return;
  if (!confirm(`למחוק את הרכב ${v.plate}?`)) return;
  vehicles = vehicles.filter(x => x.id !== id);
  save(vehicles); renderAll();
}
function callDriver(phone) {
  window.location.href = `tel:${phone}`;
}

// ────────────────────────────────────────────
// MODAL
// ────────────────────────────────────────────
function openModal(editId) {
  document.getElementById('modalBackdrop').classList.add('open');
  if (!editId) {
    document.getElementById('modalTitle').textContent = 'הוסף רכב לרשימה';
    document.getElementById('fPlate').value = '';
    document.getElementById('fCompany').value = '';
    document.getElementById('fDriver').value = '';
    document.getElementById('fLocation').value = '';
    document.getElementById('fPhone').value = '';
    document.getElementById('fExpiry').value = '';
    document.getElementById('fZone').value = 'מרכז';
    document.getElementById('fEditId').value = '';
  }
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
function editVehicle(id) {
  const v = vehicles.find(x => x.id===id);
  if (!v) return;
  document.getElementById('modalTitle').textContent = 'עריכת רכב';
  document.getElementById('fPlate').value = v.plate;
  document.getElementById('fCompany').value = v.company;
  document.getElementById('fDriver').value = v.driver;
  document.getElementById('fLocation').value = v.location;
  document.getElementById('fPhone').value = v.phone;
  document.getElementById('fExpiry').value = v.expiry;
  document.getElementById('fZone').value = v.zone;
  document.getElementById('fEditId').value = v.id;
  document.getElementById('modalBackdrop').classList.add('open');
}
function saveVehicle() {
  const plate = document.getElementById('fPlate').value.trim();
  const company = document.getElementById('fCompany').value.trim();
  const driver = document.getElementById('fDriver').value.trim();
  const location = document.getElementById('fLocation').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const expiry = document.getElementById('fExpiry').value;
  const zone = document.getElementById('fZone').value;
  const editId = parseInt(document.getElementById('fEditId').value);

  if (!plate || !expiry) { alert('חובה: לוחית רישוי ותאריך פקיעה'); return; }

  if (editId) {
    vehicles = vehicles.map(v => v.id===editId ? {...v, plate, company, driver, location, phone, expiry, zone} : v);
  } else {
    const newId = Math.max(0, ...vehicles.map(v=>v.id)) + 1;
    vehicles.push({ id:newId, plate, company, driver, location, zone, phone, expiry, done:false, note:'' });
  }
  save(vehicles);
  closeModal();
  renderAll();
}

// close on backdrop click
document.getElementById('modalBackdrop').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
